<div class="login-container">
  <div class="background-decor">
    <div class="circle sun"></div>
    <div class="circle shield"></div>
  </div>
  
  <div class="login-card">
    <div class="card-header">
      <div class="logo-container">
        <span class="logo-icon">☀️</span>
        <h1 class="logo-text">Beautiful Skin</h1>
      </div>
      <p class="subtitle">Sistema de Control Interno para Trabajadores</p>
    </div>

    <form (submit)="onSubmit()" #loginForm="ngForm" novalidate>
      <div *ngIf="errorMessage()" class="alert error-alert">
        <span class="alert-icon">⚠️</span>
        <span class="alert-text">{{ errorMessage() }}</span>
      </div>

      <div class="form-group">
        <label for="nickname">Nombre de Usuario (Nickname)</label>
        <div class="input-wrapper">
          <input
            type="text"
            id="nickname"
            name="nickname"
            [(ngModel)]="nickname"
            required
            autocomplete="username"
            placeholder="Ingrese su nickname"
            #nicknameInput="ngModel"
            [class.is-invalid]="nicknameInput.touched && nicknameInput.invalid"
          >
          <span class="input-icon">👤</span>
        </div>
        <div *ngIf="nicknameInput.touched && nicknameInput.invalid" class="validation-message">
          El nombre de usuario es requerido.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            required
            autocomplete="current-password"
            placeholder="Ingrese su contraseña"
            #passwordInput="ngModel"
            [class.is-invalid]="passwordInput.touched && passwordInput.invalid"
          >
          <span class="input-icon">🔑</span>
        </div>
        <div *ngIf="passwordInput.touched && passwordInput.invalid" class="validation-message">
          La contraseña es requerida.
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading() || loginForm.invalid">
        <span *ngIf="!isLoading()">Iniciar Sesión</span>
        <span *ngIf="isLoading()" class="spinner"></span>
      </button>
    </form>
    
    <div class="card-footer">
      <p>&copy; 2026 Beautiful Skin S.A.C. - Todos los derechos reservados.</p>
    </div>
  </div>
</div>
